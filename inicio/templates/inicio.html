<!-- Evaluamos si el usuario inició sesión -->
{% if user.is_authenticated %}
    <span>Hola, <strong>{{ user.username }}</strong>! | </span>
    <a href="{% url 'admin:index' %}">Panel de Control (Admin)</a> | 
    
    <!-- Formulario seguro para cerrar sesión -->
    <form action="{% url 'logout' %}" method="post" style="display:inline;">
        {% csrf_token %}
        <button type="submit" style="background:none; border:none; color:blue; text-decoration:underline; cursor:pointer; padding:0;">Cerrar Sesión</button>
    </form>
{% else %}
    <!-- Si no está logueado, le mostramos el link para ir al Login -->
    <a href="{% url 'login' %}">Iniciar Sesión</a>
{% endif %}
