<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - El Blog de Gastón</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
            background-color: #f8f9fa;
        }
        .register-container {
            background: #ffffff;
            border: 1px solid #dee2e6;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        h2 {
            margin-top: 0;
            color: #212529;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }
        form p {
            margin-bottom: 15px;
        }
        form input {
            width: 93%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 1rem;
        }
        form input:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13,110,253,0.25);
        }
        .btn-register {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        .btn-register:hover {
            background-color: #0b5ed7;
        }
        .links {
            margin-top: 20px;
            font-size: 0.9rem;
            text-align: center;
        }
        .links a {
            color: #0d6efd;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .helptext {
            display: block;
            font-size: 0.8rem;
            color: #6c757d;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Crear una Cuenta Nueva</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-register">Registrarme e Ingresar</button>
    </form>

    <div class="links">
        <a href="{% url 'login' %}">¿Ya tenés una cuenta? Iniciá sesión acá</a>
        <br><br>
        <a href="{% url 'inicio' %}">← Volver al Inicio</a>
    </div>
</div>

</body>
</html>
