<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Mi Blog</title>
</head>
<body>
    <h2>Iniciar Sesión</h2>
    
    <form method="post">
        <!-- Token de seguridad obligatorio para formularios en Django -->
        {% csrf_token %}
        
        <!-- Aquí Django genera los campos de Usuario y Contraseña automáticamente -->
        {{ form.as_p }}
        
        <button type="submit">Ingresar</button>
    </form>
</body>
</html>
